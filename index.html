<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect - Multi-College Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#60a5fa',
                        accent: '#3b82f6',
                        shine: '#e0f2fe'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-in-out',
                        'slide-up': 'slideUp 0.8s ease-out',
                        'slide-left': 'slideLeft 0.8s ease-out',
                        'slide-right': 'slideRight 0.8s ease-out',
                        'bounce-gentle': 'bounceGentle 2s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'shimmer': 'shimmer 2s linear infinite',
                        'news-slide': 'newsSlide 10s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 8s linear infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite'
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" src="js/data/mockData.js"></script>
    <script type="text/babel" src="js/context/AppContext.js"></script>
    <script type="text/babel" src="js/components/Navbar.js"></script>
    <script type="text/babel" src="js/components/HomePage.js"></script>
    <script type="text/babel" src="js/components/EventsPage.js"></script>
    <script type="text/babel" src="js/components/AchievementsPage.js"></script>
    <script type="text/babel" src="js/components/NewsPage.js"></script>
    <script type="text/babel" src="js/components/OpportunitiesPage.js"></script>
    <script type="text/babel" src="js/components/ClubsPage.js"></script>
    <script type="text/babel" src="js/components/AuthPage.js"></script>
    <script type="text/babel" src="js/components/Dashboard.js"></script>
    <script type="text/babel" src="js/components/AdminPanel.js"></script>
    <script type="text/babel" src="js/app.js"></script>
</body>
</html>
